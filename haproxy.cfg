# ---------------------------------------------------------------------
# GLOBAL & DEFAULTS (Docker & Flux Optimized)
# ---------------------------------------------------------------------
global
    log stdout format raw local0
    maxconn 45000

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  1h
    timeout server  1h

# ---------------------------------------------------------------------
# DNS RESOLVERS
# ---------------------------------------------------------------------
resolvers mydns
    nameserver dns1 8.8.8.8:53
    resolve_retries 3
    timeout resolve 1s
    hold valid 300s

# ---------------------------------------------------------------------
# CENTRAL FRONTEND (Port Routing Logic)
# ---------------------------------------------------------------------
frontend main_entry_point
    mode tcp
    option tcplog
    
    bind *:63936
    bind *:63639
    bind *:443
    bind *:63369
    bind *:63963

    acl is_port_63936 dst_port 63936
    acl is_port_63639 dst_port 63639
    acl is_port_63369 dst_port 63369
    acl is_port_63963 dst_port 63963
    acl is_port_443   dst_port 443

    use_backend backend_group_a if is_port_63936
    use_backend backend_group_b if is_port_63639
    use_backend backend_group_c if is_port_443
    use_backend backend_group_d if is_port_63369
    use_backend backend_group_e if is_port_63963

# ---------------------------------------------------------------------
# BACKEND GROUP A (For Port 255)
# ---------------------------------------------------------------------
backend backend_group_a
    mode tcp
    balance leastconn
    stick-table type ip size 1m expire 30m
    stick on src

    server node1 node1.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node2 node2.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node3 node3.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node4 node4.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s

# ---------------------------------------------------------------------
# BACKEND GROUP B (For Port 355)
# ---------------------------------------------------------------------
backend backend_group_b
    mode tcp
    balance leastconn
    stick-table type ip size 1m expire 30m
    stick on src

    server node5 node2.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node6 node3.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node7 node1.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node8 node4.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s

# ---------------------------------------------------------------------
# BACKEND GROUP C (For Port 443)
# ---------------------------------------------------------------------
backend backend_group_c
    mode tcp
    balance leastconn
    stick-table type ip size 1m expire 30m
    stick on src

    server node9 nl-node2.cocomelon.org:443 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node10 nl-node3.cocomelon.org:443 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node11 nl-node4.cocomelon.org:443 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node12 arash3.jokershadow.org:443 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node13 arash4.jokershadow.org:443 resolvers mydns resolve-prefer ipv4 check inter 5s

# ---------------------------------------------------------------------
# BACKEND GROUP D (For Port 63369)
# ---------------------------------------------------------------------
backend backend_group_d
    mode tcp
    balance leastconn
    stick-table type ip size 1m expire 30m
    stick on src

    server node1 node2.jokershadow.org:6060 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node2 node3.jokershadow.org:6060 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node3 node1.jokershadow.org:6060 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node4 node4.jokershadow.org:6060 resolvers mydns resolve-prefer ipv4 check inter 5s

# ---------------------------------------------------------------------
# BACKEND GROUP E (For Port 63963)
# ---------------------------------------------------------------------
backend backend_group_e
    mode tcp
    balance leastconn
    stick-table type ip size 1m expire 30m
    stick on src

    server node9 nl-node2.cocomelon.org:8080 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node10 nl-node3.cocomelon.org:8080 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node11 nl-node4.cocomelon.org:8080 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node12 arash3.jokershadow.org:8080 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node13 arash4.jokershadow.org:8080 resolvers mydns resolve-prefer ipv4 check inter 5s

# ---------------------------------------------------------------------
# DEDICATED HAPROXY API & STATS PORT (جدید)
# ---------------------------------------------------------------------
listen haproxy_stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
