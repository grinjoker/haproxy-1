    stick-table type ip size 1m expire 30m
    stick on src

    # Target Xray/V2Ray servers for this port
    server node5 node2.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node6 node3.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s
	server node7 node1.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node8 node4.jokershadow.org:7070 resolvers mydns resolve-prefer ipv4 check inter 5s

		
