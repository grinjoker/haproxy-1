# ---------------------------------------------------------------------
# GLOBAL & DEFAULTS (Optimized for High Performance)
# ---------------------------------------------------------------------
global
    log /dev/log local0
    log /dev/log local1 notice
    #chroot /var/lib/haproxy
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 45000

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    # Increased timeouts for stable VLESS connections
    timeout connect 5s
    timeout client  1h
    timeout server  1h

# ---------------------------------------------------------------------
# DNS RESOLVERS
# ---------------------------------------------------------------------
resolvers mydns
    nameserver dns1 8.8.8.8:53
    resolve_retries 3
    timeout resolve 1s
    hold valid 300s

# ---------------------------------------------------------------------
# CENTRAL FRONTEND (Port Routing Logic)
# ---------------------------------------------------------------------
frontend main_entry_point
    mode tcp
    option tcplog
    
    # 1. Bind all required ports here
    bind *:63936
    bind *:63639
    bind *:443
    bind *:63369
    bind *:63963
    # You can add more ports easily: bind *:443, bind *:8080, etc.

    # 2. Define Access Control Lists (ACLs) based on destination port
    acl is_port_63936 dst_port 63936
    acl is_port_63639 dst_port 63639
    acl is_port_63369 dst_port 63369
    acl is_port_63963 dst_port 63963
	acl is_port_443   dst_port 443

    # 3. Route traffic to specific backends based on the ACL
    use_backend backend_group_a if is_port_63936
    use_backend backend_group_b if is_port_63639
    
	use_backend backend_group_c if is_port_443
	use_backend backend_group_d if is_port_63369
	use_backend backend_group_e if is_port_63963

    # Fallback (optional) - if a port is not matched
    # default_backend some_default_backend

# ---------------------------------------------------------------------
# BACKEND GROUP A (For Port 255)
# ---------------------------------------------------------------------
backend backend_group_a
    mode tcp
    balance leastconn
    
    # Stickiness to prevent user disconnection
    stick-table type ip size 1m expire 30m
    stick on src

    # Target Xray/V2Ray servers for this port
    # Note: The destination port on the target server doesn't HAVE to be 255.
    # It can be mapped (e.g., entering 255 -> forwarding to 2055).
    # Here we assume it maps 1:1.
    server node1 node1.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node2 node2.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s
	server node3 node3.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s
    server node4 node4.jokershadow.org:4040 resolvers mydns resolve-prefer ipv4 check inter 5s

